name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create GitHub Releases on tag
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (tokenless OIDC) requires npm >= 11.5.1. We pin to the
      # npm 11 line: npm@12.0.0's global install currently ships a broken
      # provenance path (missing bundled 'sigstore').
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      # No NODE_AUTH_TOKEN: auth happens via OIDC once this repo/workflow is
      # registered as a Trusted Publisher on npmjs.com. Provenance is automatic.
      - name: Publish to npm
        run: npm publish --access public

      # Cut a GitHub Release from the tag (only on tag pushes, not manual runs).
      # --generate-notes auto-builds notes from commits/PRs since the last tag.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
