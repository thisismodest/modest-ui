name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (tokenless OIDC) requires npm >= 11.5.1. We pin to the
      # npm 11 line: npm@12.0.0's global install currently ships a broken
      # provenance path (missing bundled 'sigstore').
      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      # No NODE_AUTH_TOKEN: auth happens via OIDC once this repo/workflow is
      # registered as a Trusted Publisher on npmjs.com. Provenance is automatic.
      - name: Publish to npm
        run: npm publish --access public
