name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (tokenless OIDC) requires a recent npm CLI.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      # No NODE_AUTH_TOKEN: auth happens via OIDC once this repo/workflow is
      # registered as a Trusted Publisher on npmjs.com. Provenance is automatic.
      - name: Publish to npm
        run: npm publish --access public
