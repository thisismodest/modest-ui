<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Picker</title>
    <link rel="stylesheet" href="../../base/tokens.css" />
    <link rel="stylesheet" href="../../base/reset.css" />
    <link rel="stylesheet" href="color-picker.css" />
    <style>
      body {
        font-family: var(--mdst-font-sans);
        padding: var(--mdst-space-md);
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: var(--mdst-space-lg);
        max-width: 20rem;
      }

      .label {
        font-size: var(--mdst-text-sm);
        color: var(--mdst-color-muted);
        margin-bottom: var(--mdst-space-xs);
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div>
        <div class="label">Color input only</div>
        <div class="mdst-color-picker">
          <input type="color" class="mdst-color-picker__input" value="#000000" />
        </div>
      </div>
      <div>
        <div class="label">With text input</div>
        <div class="mdst-color-picker">
          <input type="color" class="mdst-color-picker__input" value="#4A3F1F" />
          <input type="text" class="mdst-color-picker__text" value="#4A3F1F" />
        </div>
      </div>
      <div>
        <div class="label">Square variant</div>
        <div class="mdst-color-picker mdst-color-picker--square">
          <input type="color" class="mdst-color-picker__input" value="#F4E3C1" />
          <input type="text" class="mdst-color-picker__text" value="#F4E3C1" />
        </div>
      </div>
      <div>
        <div class="label">Disabled</div>
        <div class="mdst-color-picker">
          <input type="color" class="mdst-color-picker__input" value="#666666" disabled />
          <input type="text" class="mdst-color-picker__text" value="#666666" disabled />
        </div>
      </div>
    </div>
  </body>
</html>
