<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio</title>
    <link rel="stylesheet" href="../../base/tokens.css" />
    <link rel="stylesheet" href="../../base/reset.css" />
    <link rel="stylesheet" href="radio.css" />
    <style>
      body {
        font-family: var(--mdst-font-sans);
        padding: var(--mdst-space-md);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: var(--mdst-space-md);
        align-items: center;
        margin-bottom: var(--mdst-space-md);
      }

      .label {
        font-size: var(--mdst-text-sm);
        color: var(--mdst-color-muted);
        margin-bottom: var(--mdst-space-xs);
      }
    </style>
  </head>
  <body>
    <div class="label">States</div>
    <div class="row">
      <label class="mdst-radio-label">
        <input type="radio" name="states" class="mdst-radio" />
        Unselected
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="states" class="mdst-radio" checked />
        Selected
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="disabled" class="mdst-radio" disabled />
        Disabled
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="disabled-checked" class="mdst-radio" checked disabled />
        Selected & Disabled
      </label>
    </div>

    <div class="label">Radio Group (Vertical)</div>
    <div class="mdst-radio-group">
      <label class="mdst-radio-label">
        <input type="radio" name="vertical" class="mdst-radio" checked />
        Option 1
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="vertical" class="mdst-radio" />
        Option 2
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="vertical" class="mdst-radio" />
        Option 3
      </label>
    </div>

    <div class="label" style="margin-top: var(--mdst-space-md);">Radio Group (Horizontal)</div>
    <div class="mdst-radio-group mdst-radio-group--horizontal">
      <label class="mdst-radio-label">
        <input type="radio" name="horizontal" class="mdst-radio" checked />
        Option 1
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="horizontal" class="mdst-radio" />
        Option 2
      </label>
      <label class="mdst-radio-label">
        <input type="radio" name="horizontal" class="mdst-radio" />
        Option 3
      </label>
    </div>

    <div class="label" style="margin-top: var(--mdst-space-md);">Standalone</div>
    <div class="row">
      <input type="radio" name="standalone" class="mdst-radio" />
      <input type="radio" name="standalone" class="mdst-radio" checked />
      <input type="radio" name="standalone-disabled" class="mdst-radio" disabled />
    </div>
  </body>
</html>
