<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>modest-ui</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="index.css" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        min-width: 230px;
      }

      body {
        font-family: var(--mdst-font-sans);
        background: var(--mdst-color-bg);
        color: var(--mdst-color-fg);
      }

      .layout {
        display: flex;
        height: 100%;
      }

      .sidebar {
        width: 48px;
        flex-shrink: 0;
        border-right: 0.0625em solid var(--mdst-color-border);
        /*margin: var(--mdst-space-md);*/
        display: flex;
        flex-direction: column;
        gap: var(--mdst-space-md);
        overflow: hidden;
        background: var(--mdst-color-bg);
        transition: width var(--mdst-transition);
      }

      .sidebar:not([open]) .sidebar-title {
        display: block;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }

      .sidebar[open] {
        width: 14rem;
        overflow-y: auto;
        padding: var(--mdst-space-md);
      }

      @media (max-width: 640px) {
        .sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100%;
          z-index: 100;
        }

        .main {
          margin-left: 48px;
        }

        .sidebar-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.3);
          z-index: 99;
          opacity: 0;
          pointer-events: none;
          transition: opacity var(--mdst-transition);
        }

        .sidebar[open] ~ .sidebar-overlay {
          opacity: 1;
          pointer-events: auto;
        }
      }

      .sidebar-content {
        width: calc(14rem - (2 * var(--mdst-space-md)));
        display: flex;
        flex-direction: column;
        flex: 1;
        gap: var(--mdst-space-md);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--mdst-transition);
        height: 100%;
      }

      .sidebar[open] .sidebar-content {
        opacity: 1;
        pointer-events: auto;
      }

      .sidebar-title {
        display: flex;
        min-height: 2rem;
        align-items: center;
        gap: var(--mdst-space-sm);
        font-size: var(--mdst-text-sm);
        font-weight: 700;
        letter-spacing: 0.025em;
        list-style: none;
        cursor: pointer;
      }

      .sidebar-title::-webkit-details-marker {
        display: none;
      }

      .sidebar-logo {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }

      .sidebar-logo svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: var(--mdst-space-xs);
      }

      .sidebar-link {
        display: block;
        padding: var(--mdst-space-xs) var(--mdst-space-sm);
        font-size: var(--mdst-text-sm);
        color: var(--mdst-color-muted);
        text-decoration: none;
        border-radius: var(--mdst-radius);
        transition:
          color var(--mdst-transition),
          background var(--mdst-transition);
      }

      .sidebar-link:hover {
        color: var(--mdst-color-fg);
        background: var(--mdst-color-subtle);
      }

      .sidebar-link.active {
        color: var(--mdst-color-fg);
        background: var(--mdst-color-subtle);
        font-weight: 500;
      }

      .main {
        flex: 1;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .main-header {
        padding: var(--mdst-space-md);
        border-bottom: 0.0625em solid var(--mdst-color-border);
        font-size: var(--mdst-text-lg);
        font-weight: 600;
        background: var(--mdst-color-subtle);
      }

      .main-content {
        flex: 1;
        overflow: hidden;
      }

      .main-content iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .github-link {
        margin-top: auto;
        padding-top: var(--mdst-space-md);
        border-top: 0.0625em solid var(--mdst-color-border);
      }

      .github-link a {
        font-size: var(--mdst-text-sm);
        color: var(--mdst-color-muted);
        text-decoration: none;
      }

      .github-link a:hover {
        color: var(--mdst-color-fg);
      }

      .logo {
        margin-top: 2px;
        font-size: 0.8rem;
        line-height: 0;
        font-weight: normal;
        letter-spacing: 1px;
        font-family: monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .sidebar:not([open]) .logo,
      .sidebar:not([open]) .sidebar-close {
        display: none;
      }

      .sidebar:not([open]) .sidebar-logo {
        margin: var(--mdst-space-md);
        margin-top: 1.5rem;
      }

      .sidebar-close {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 2rem;
        height: 2rem;
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.25rem;
        color: var(--mdst-color-fg);
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--mdst-transition);
      }

      .sidebar[open] .sidebar-close {
        opacity: 1;
        pointer-events: auto;
      }

      .sidebar-overlay {
        display: none;
      }

      @media (max-width: 640px) {
        .sidebar-overlay {
          display: block;
        }
      }

      /* Auto-open sidebar on desktop for modern browsers */
      @supports selector(::details-content) {
        @media (min-width: 720px) {
          .sidebar {
            width: 14rem;
            overflow-y: auto;
            padding: var(--mdst-space-md);
          }

          .sidebar::details-content {
            content-visibility: visible;
          }

          .sidebar:not([open]) .sidebar-title {
            display: flex;
            height: auto;
          }

          .sidebar[open] .sidebar-title,
          .sidebar:not([open]) .sidebar-title {
            pointer-events: none;
          }

          .sidebar:not([open]) .logo {
            display: flex;
          }

          .sidebar:not([open]) .sidebar-close,
          .sidebar[open] .sidebar-close {
            display: none;
          }

          .sidebar:not([open]) .sidebar-logo {
            margin: 0;
          }

          .sidebar .sidebar-content {
            opacity: 1;
            pointer-events: auto;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <details class="sidebar" id="sidebar">
        <summary class="sidebar-title">
          <div class="sidebar-logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
              <rect x="6" y="10" width="4" height="16" fill="currentColor" />
              <rect x="14" y="6" width="4" height="20" fill="currentColor" />
              <rect x="22" y="10" width="4" height="16" fill="currentColor" />
            </svg>
          </div>
          <div class="logo">modest-ui</div>
          <span class="sidebar-close" aria-label="Close sidebar">‹</span>
        </summary>
        <div class="sidebar-content">
          <nav class="sidebar-nav">
            <a href="#intro" class="sidebar-link" data-component="intro">Introduction</a>
            <!-- COMPONENTS_LIST_START -->
            <a href="#button" class="sidebar-link" data-component="button">Button</a>
            <a href="#checkbox" class="sidebar-link" data-component="checkbox">Checkbox</a>
            <a href="#code" class="sidebar-link" data-component="code">Code</a>
            <a href="#color-picker" class="sidebar-link" data-component="color-picker">Color Picker</a>
            <a href="#details" class="sidebar-link" data-component="details">Details</a>
            <a href="#dialog" class="sidebar-link" data-component="dialog">Dialog</a>
            <a href="#input" class="sidebar-link" data-component="input">Input</a>
            <a href="#otp-input" class="sidebar-link" data-component="otp-input">OTP Input</a>
            <a href="#popover" class="sidebar-link" data-component="popover">Popover</a>
            <a href="#pre" class="sidebar-link" data-component="pre">Pre</a>
            <a href="#radio" class="sidebar-link" data-component="radio">Radio</a>
            <a href="#range" class="sidebar-link" data-component="range">Range</a>
            <a href="#tooltip" class="sidebar-link" data-component="tooltip">Tooltip</a>
            <a href="#typography" class="sidebar-link" data-component="typography">Typography</a>
            <!-- COMPONENTS_LIST_END -->
          </nav>
          <div class="github-link">
            <a href="https://github.com/thisismodest/modest-ui">GitHub</a>
          </div>
        </div>
      </details>

      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <main class="main">
        <header class="main-header" id="component-title">Introduction</header>
        <div class="main-content">
          <iframe id="component-frame" src="components/intro/preview.html"></iframe>
        </div>
      </main>
    </div>

    <script>
      const links = document.querySelectorAll(".sidebar-link");
      const frame = document.getElementById("component-frame");
      const title = document.getElementById("component-title");
      const sidebar = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebar-overlay");

      function setActive(component) {
        links.forEach((link) => {
          link.classList.toggle("active", link.dataset.component === component);
        });
      }

      function loadComponent(component) {
        const link = document.querySelector(`[data-component="${component}"]`);
        if (!link) return;

        frame.src = `components/${component}/preview.html`;
        title.textContent = link.textContent;
        setActive(component);
      }

      function closeSidebar() {
        sidebar.removeAttribute("open");
      }

      // Close sidebar when clicking overlay (mobile)
      sidebarOverlay.addEventListener("click", closeSidebar);

      links.forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const component = link.dataset.component;
          loadComponent(component);
          history.pushState(null, "", `#${component}`);
        });
      });

      // Load from hash or show intro
      const hash = window.location.hash.slice(1);
      if (hash) {
        loadComponent(hash);
      }

      window.addEventListener("hashchange", () => {
        const hash = window.location.hash.slice(1);
        if (hash) loadComponent(hash);
      });
    </script>
  </body>
</html>
